# Generated from xtask::workflows::bump_zed_version
# Rebuild with `cargo xtask workflows`.
name: bump_zed_version
run-name: bump_zed_version (${{ inputs.bump_type }})
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type: major, minor, or patch'
        required: true
        type: string
      patch_channel:
        description: 'For patch bumps only: preview, stable, or both'
        type: string
        default: both
jobs:
  plan_version_bump:
    if: github.repository_owner == 'zed-industries'
    runs-on: namespace-profile-2x4-ubuntu-2404
    steps:
    - id: generate-token
      name: steps::authenticate_as_zippy
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      with:
        app-id: ${{ secrets.ZED_ZIPPY_APP_ID }}
        private-key: ${{ secrets.ZED_ZIPPY_APP_PRIVATE_KEY }}
    - name: steps::checkout_repo
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        clean: false
        token: ${{ steps.generate-token.outputs.token }}
    - id: compute-matrix
      name: bump_zed_version::plan_version_bump::compute_matrix
      run: |
        matrix=$(script/bump-zed-version plan "$BUMP_TYPE" "$PATCH_CHANNEL")
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
      env:
        BUMP_TYPE: ${{ inputs.bump_type }}
        PATCH_CHANNEL: ${{ inputs.patch_channel }}
    outputs:
      matrix: ${{ steps.compute-matrix.outputs.matrix }}
  execute_version_bump:
    needs:
    - plan_version_bump
    if: needs.plan_version_bump.outputs.matrix != '[]'
    runs-on: namespace-profile-16x32-ubuntu-2204
    strategy:
      matrix:
        include: ${{ fromJson(needs.plan_version_bump.outputs.matrix) }}
      fail-fast: false
    steps:
    - id: generate-token
      name: steps::authenticate_as_zippy
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      with:
        app-id: ${{ secrets.ZED_ZIPPY_APP_ID }}
        private-key: ${{ secrets.ZED_ZIPPY_APP_PRIVATE_KEY }}
        permission-contents: write
        permission-pull-requests: write
    - name: steps::checkout_repo
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        clean: false
        ref: ${{ matrix.checkout_ref }}
        token: ${{ steps.generate-token.outputs.token }}
    - name: bump_zed_version::execute_version_bump::run_version_bump
      run: script/bump-zed-version execute "$TARGET_BRANCH" "$BUMP" "$NEW_CHANNEL"
      env:
        GIT_COMMITTER_NAME: Zed Zippy
        GIT_COMMITTER_EMAIL: 234243425+zed-zippy[bot]@users.noreply.github.com
        GIT_AUTHOR_NAME: Zed Zippy
        GIT_AUTHOR_EMAIL: 234243425+zed-zippy[bot]@users.noreply.github.com
        GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        TARGET_BRANCH: ${{ matrix.target_branch }}
        BUMP: ${{ matrix.bump }}
        NEW_CHANNEL: ${{ matrix.new_channel }}
concurrency:
  group: bump-zed-version
defaults:
  run:
    shell: bash -euxo pipefail {0}
