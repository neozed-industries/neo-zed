# Generated from xtask::workflows::bump_zed_version
# Rebuild with `cargo xtask workflows`.
name: bump_zed_version
run-name: bump_zed_version (${{ inputs.bump_type }})
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type: major, minor, or patch'
        required: true
        type: string
      patch_channel:
        description: 'For patch bumps only: preview, stable, or both'
        type: string
        default: both
jobs:
  plan_version_bump:
    if: github.repository_owner == 'zed-industries'
    runs-on: namespace-profile-2x4-ubuntu-2404
    steps:
    - id: generate-token
      name: steps::authenticate_as_zippy
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      with:
        app-id: ${{ secrets.ZED_ZIPPY_APP_ID }}
        private-key: ${{ secrets.ZED_ZIPPY_APP_PRIVATE_KEY }}
    - name: steps::checkout_repo
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        clean: false
        token: ${{ steps.generate-token.outputs.token }}
    - id: compute-matrix
      name: bump_zed_version::plan_version_bump::compute_matrix
      run: |
        matrix=$(script/plan-zed-version-bump "$BUMP_TYPE" "$PATCH_CHANNEL")
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
      env:
        BUMP_TYPE: ${{ inputs.bump_type }}
        PATCH_CHANNEL: ${{ inputs.patch_channel }}
    outputs:
      matrix: ${{ steps.compute-matrix.outputs.matrix }}
  execute_version_bump:
    needs:
    - plan_version_bump
    if: needs.plan_version_bump.outputs.matrix != '[]'
    runs-on: namespace-profile-16x32-ubuntu-2204
    strategy:
      matrix:
        include: ${{ fromJson(needs.plan_version_bump.outputs.matrix) }}
      fail-fast: false
    steps:
    - id: generate-token
      name: steps::authenticate_as_zippy
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      with:
        app-id: ${{ secrets.ZED_ZIPPY_APP_ID }}
        private-key: ${{ secrets.ZED_ZIPPY_APP_PRIVATE_KEY }}
        permission-contents: write
        permission-pull-requests: write
    - name: steps::checkout_repo
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        clean: false
        ref: ${{ matrix.checkout_ref }}
        token: ${{ steps.generate-token.outputs.token }}
    - name: bump_zed_version::execute_version_bump::install_cargo_edit
      uses: taiki-e/install-action@02cc5f8ca9f2301050c0c099055816a41ee05507
      with:
        tool: cargo-edit
    - name: bump_zed_version::execute_version_bump::run_version_bump
      run: |
        # Only preview requires a new branch
        if [ "$NEW_CHANNEL" = "preview" ]; then
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"
        fi

        if [ -n "$BUMP" ]; then
          which cargo-set-version > /dev/null || cargo install cargo-edit -f --no-default-features --features "set-version"
          cargo set-version -p zed --bump "$BUMP" 2>&1
        fi

        if [ -n "$NEW_CHANNEL" ]; then
          printf '%s' "$NEW_CHANNEL" > crates/zed/RELEASE_CHANNEL
        fi

        version=$(script/get-crate-version zed)
        channel=$(cat crates/zed/RELEASE_CHANNEL)

        if [ "$TARGET_BRANCH" = "main" ]; then
          title="Bump Zed to v${version}"
        else
          title="Bump Zed ${channel} to v${version}"
        fi
        pr_branch="bump-zed-to-${version}"

        git checkout -b "$pr_branch"
        git commit -am "$title"
        git push origin "$pr_branch"

        gh pr create \
          --title "$title" \
          --body "Release Notes:\n\n- N/A" \
          --base "$TARGET_BRANCH" \
          --head "$pr_branch"
      env:
        GIT_COMMITTER_NAME: Zed Zippy
        GIT_COMMITTER_EMAIL: 234243425+zed-zippy[bot]@users.noreply.github.com
        GIT_AUTHOR_NAME: Zed Zippy
        GIT_AUTHOR_EMAIL: 234243425+zed-zippy[bot]@users.noreply.github.com
        GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        TARGET_BRANCH: ${{ matrix.target_branch }}
        BUMP: ${{ matrix.bump }}
        NEW_CHANNEL: ${{ matrix.new_channel }}
concurrency:
  group: bump-zed-version
defaults:
  run:
    shell: bash -euxo pipefail {0}
